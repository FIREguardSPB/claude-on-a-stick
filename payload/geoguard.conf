# geoguard.conf - anti-ban geo-guard configuration (CONTRACTS.md §5).
# Plain KEY=VALUE, shell-sourceable. Shared verbatim by geoguard.sh and geoguard.ps1.
# Edit on the stick to change behaviour without rebuilding.

# Master switch. 1 = enforce the guard; 0 = skip entirely (for users who are
# already in an unrestricted region and don't want any checks/VPN at all).
GUARD_ENABLED=1

# Comma-separated ISO 3166-1 alpha-2 country codes whose exit IPs are refused.
# These are regions where running Claude Code risks an account ban.
BLOCKLIST=RU,BY,CU,IR,KP,SY

# What to do when the exit country cannot be determined (all probes failed):
#   prompt = ask the user interactively (default)
#   block  = refuse to launch (fail closed - safest)
#   allow  = launch anyway (fail open)
INCONCLUSIVE=prompt
